<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Morgue Management System - Secure Login">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>Login — Morgue Management System</title>
    <style>
        :root {
            --color-primary: #0096c7;
            --color-primary-dark: #0077a3;
            --color-primary-light: #00b4e6;
            --color-bg-start: #1b4f5c;
            --color-bg-end: #0c2d35;
            --color-surface: rgba(20, 25, 30, 0.88);
            --color-text: #e0e0e0;
            --color-text-muted: #a0b9c2;
            --color-border: rgba(255, 255, 255, 0.10);
            --color-border-focus: rgba(0, 150, 199, 0.5);
            --color-error: #e74c3c;
            --color-error-bg: rgba(231, 76, 60, 0.12);
            --color-success: #27ae60;
            --color-success-bg: rgba(39, 174, 96, 0.12);
            --radius: 10px;
            --radius-card: 18px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.6);
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                        url('morgue-bg.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-text);
        }

        .login-card {
            background: var(--color-surface);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: var(--radius-card);
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--color-border);
            animation: slideUp 0.45s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, var(--color-bg-start), var(--color-bg-end));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);
        }

        .logo-icon svg {
            width: 34px;
            height: 34px;
            fill: none;
            stroke: var(--color-primary-light);
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--color-text-muted);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 12px;
            color: #cfcfcf;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 13px 14px;
            padding-right: 44px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            font-size: 15px;
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-border-focus);
            background: rgba(255, 255, 255, 0.1);
        }

        input:focus-visible {
            outline: 2px solid var(--color-primary-light);
            outline-offset: 1px;
        }

        input[aria-invalid="true"] {
            border-color: var(--color-error);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2);
        }

        input::placeholder {
            color: #777;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition), background var(--transition);
        }

        .toggle-password:hover {
            color: #ddd;
            background: rgba(255, 255, 255, 0.08);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .caps-warning {
            display: none;
            font-size: 12px;
            color: #f0ad4e;
            margin-top: 4px;
            align-items: center;
            gap: 4px;
        }

        .caps-warning.show {
            display: flex;
        }

        .field-error {
            display: none;
            font-size: 12px;
            color: var(--color-error);
            margin-top: 4px;
        }

        .field-error.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-2px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 6px 0 26px;
        }

        .remember-section {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            width: 17px;
            height: 17px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .remember-section label {
            margin: 0;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
            font-size: 13px;
            cursor: pointer;
            color: #bbb;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--color-primary);
            text-decoration: none;
            transition: color var(--transition);
        }

        .forgot-link:hover {
            color: var(--color-primary-light);
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--color-bg-start), var(--color-bg-end));
            color: white;
            border: 1px solid rgba(0, 150, 199, 0.35);
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--color-bg-end), #061a1f);
            box-shadow: 0 6px 24px rgba(0, 150, 199, 0.3);
            transform: translateY(-1px);
            border-color: rgba(0, 150, 199, 0.55);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        .login-btn.loading .btn-text {
            opacity: 0.8;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            display: none;
            padding: 12px 14px;
            border-radius: 7px;
            margin-top: 18px;
            font-size: 13px;
            font-weight: 500;
            border-left: 4px solid transparent;
            animation: fadeIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: var(--color-error-bg);
            color: #f1948a;
            border-left-color: var(--color-error);
        }

        .alert-success {
            background: var(--color-success-bg);
            color: #82e0aa;
            border-left-color: var(--color-success);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                margin: 16px;
            }

            h1 {
                font-size: 22px;
            }

            .logo-icon {
                width: 58px;
                height: 58px;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card" role="region" aria-labelledby="login-heading">
        <div class="logo-section">
            <div class="logo-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3a1 1 0 0 1 1 1v1h1a1 1 0 1 1 0 2h-1v1a1 1 0 1 1-2 0V7h-1a1 1 0 1 1 0-2h1V4a1 1 0 0 1 1-1z"/>
                    <path d="M6 12h12"/>
                    <path d="M6 16h8"/>
                    <path d="M6 20h12"/>
                    <path d="M4 4h16v16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4z"/>
                </svg>
            </div>
            <h1 id="login-heading">MMS</h1>
            <p class="subtitle">Morgue Management System</p>
        </div>

        <form id="loginForm" novalidate autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username"
                           placeholder="Enter your username"
                           autocomplete="username"
                           autocapitalize="off"
                           autocorrect="off"
                           spellcheck="false"
                           inputmode="text"
                           aria-describedby="usernameError"
                           aria-required="true"
                           required>
                </div>
                <div class="field-error" id="usernameError" role="alert" aria-live="polite"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           spellcheck="false"
                           aria-describedby="passwordError"
                           aria-required="true"
                           required>
                    <button type="button" class="toggle-password"
                            id="togglePassword"
                            aria-label="Show password"
                            tabindex="-1">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="caps-warning" id="capsWarning" role="alert" aria-live="polite">
                    <span>&#x26a0;</span> Caps Lock is on
                </div>
                <div class="field-error" id="passwordError" role="alert" aria-live="polite"></div>
            </div>

            <div class="form-options">
                <div class="remember-section">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me for 30 days</label>
                </div>
                <a href="#" class="forgot-link" tabindex="0">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="spinner" aria-hidden="true"></span>
                <span class="btn-text">Login</span>
            </button>

            <div class="alert alert-error" id="loginAlert" role="alert" aria-live="polite"></div>
            <div class="alert alert-success" id="successAlert" role="alert" aria-live="polite"></div>
        </form>
    </div>

    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const rememberCheckbox = document.getElementById('rememberMe');
            const loginBtn = document.getElementById('loginBtn');
            const loginAlert = document.getElementById('loginAlert');
            const successAlert = document.getElementById('successAlert');
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');
            const capsWarning = document.getElementById('capsWarning');
            const togglePassword = document.getElementById('togglePassword');

            let isSubmitting = false;

            /* ---------- auto-focus ---------- */
            window.addEventListener('load', () => {
                const saved = localStorage.getItem('rememberedUsername');
                if (saved) {
                    usernameInput.value = saved;
                    rememberCheckbox.checked = true;
                    passwordInput.focus();
                } else {
                    usernameInput.focus();
                }
            });

            /* ---------- remember me ---------- */
            rememberCheckbox.addEventListener('change', () => {
                if (!rememberCheckbox.checked) {
                    localStorage.removeItem('rememberedUsername');
                }
            });

            /* ---------- caps lock warning ---------- */
            passwordInput.addEventListener('keyup', (e) => {
                capsWarning.classList.toggle('show', e.getModifierState('CapsLock'));
            });

            /* ---------- password visibility toggle ---------- */
            togglePassword.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                togglePassword.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
                togglePassword.querySelector('svg').innerHTML = isPassword
                    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
                    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            });

            /* ---------- clear field errors on input ---------- */
            usernameInput.addEventListener('input', () => {
                usernameError.classList.remove('show');
                usernameInput.removeAttribute('aria-invalid');
                loginAlert.classList.remove('show');
            });

            passwordInput.addEventListener('input', () => {
                passwordError.classList.remove('show');
                passwordInput.removeAttribute('aria-invalid');
                loginAlert.classList.remove('show');
            });

            /* ---------- form submit ---------- */
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (isSubmitting) return;

                loginAlert.classList.remove('show');
                successAlert.classList.remove('show');
                usernameError.classList.remove('show');
                passwordError.classList.remove('show');
                usernameInput.removeAttribute('aria-invalid');
                passwordInput.removeAttribute('aria-invalid');

                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                let hasError = false;

                if (!username) {
                    usernameError.textContent = 'Username is required';
                    usernameError.classList.add('show');
                    usernameInput.setAttribute('aria-invalid', 'true');
                    hasError = true;
                }

                if (!password) {
                    passwordError.textContent = 'Password is required';
                    passwordError.classList.add('show');
                    passwordInput.setAttribute('aria-invalid', 'true');
                    hasError = true;
                }

                if (hasError) return;

                /* ---------- loading state ---------- */
                isSubmitting = true;
                loginBtn.disabled = true;
                loginBtn.classList.add('loading');

                /*
                 * In production, replace this with a fetch() call to your backend:
                 *
                 *   const res = await fetch('/api/login', {
                 *       method: 'POST',
                 *       headers: { 'Content-Type': 'application/json' },
                 *       body: JSON.stringify({ username, password }),
                 *   });
                 *   const data = await res.json();
                 *
                 * NEVER validate credentials in client-side code.
                 */

                /* simulate network delay */
                await new Promise((r) => setTimeout(r, 800));

                const DEMO_USER = 'admin';
                const DEMO_PASS = 'password123';

                if (username === DEMO_USER && password === DEMO_PASS) {
                    if (rememberCheckbox.checked) {
                        localStorage.setItem('rememberedUsername', username);
                    } else {
                        localStorage.removeItem('rememberedUsername');
                    }

                    sessionStorage.setItem('username', username);

                    successAlert.textContent = 'Login successful! Redirecting\u2026';
                    successAlert.classList.add('show');

                    setTimeout(() => {
                        window.location.replace('dashboard.html');
                    }, 900);
                } else {
                    /* generic error – don't reveal which field is wrong */
                    loginAlert.textContent = 'Invalid username or password. Please try again.';
                    loginAlert.classList.add('show');
                    passwordInput.select();

                    isSubmitting = false;
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('loading');
                }
            });
        })();
    </script>
</body>
</html>
